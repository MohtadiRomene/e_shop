name: CI/CD EKS Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  REGISTRY: 869937525188.dkr.ecr.us-east-1.amazonaws.com
  APP_REPOSITORY: e-shop/app
  WEB_REPOSITORY: e-shop/web
  SONAR_HOST: http://3.87.200.146:9000

jobs:

# =========================
# 1. TESTS
# =========================
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/app_test"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait MySQL
        run: sleep 15

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run tests
        run: php bin/phpunit

# =========================
# 2. SONARQUBE
# =========================
  sonar:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Debug Sonar Host
        run: echo "SONAR_HOST=$SONAR_HOST"

      - name: Check Sonar connectivity
        run: |
          set -euo pipefail
          for i in {1..5}; do
            echo "Checking SonarQube..."
            if curl -s --max-time 5 "$SONAR_HOST/api/server/version"; then
              echo "SonarQube reachable"
              exit 0
            fi
            echo "Attempt $i failed"
            sleep 5
          done
          echo "SonarQube NOT reachable"
          exit 1

      - name: Sonar Scan
        run: |
          docker run --rm \
            -e SONAR_HOST_URL="$SONAR_HOST" \
            -e SONAR_LOGIN="${{ secrets.SONAR_TOKEN }}" \
            -v "${PWD}:/usr/src" \
            sonarsource/sonar-scanner-cli

# =========================
# 3. BUILD & PUSH ECR
# =========================
  build:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $REGISTRY

      - name: Build images
        run: |
          docker build -t $REGISTRY/$APP_REPOSITORY:latest .
          docker build -f docker/nginx/Dockerfile -t $REGISTRY/$WEB_REPOSITORY:latest .

      - name: Push images
        run: |
          docker push $REGISTRY/$APP_REPOSITORY:latest
          docker push $REGISTRY/$WEB_REPOSITORY:latest

# =========================
# 4. DAST (ZAP)
# =========================
  dast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run container
        run: docker run -d -p 8080:80 nginx

      - name: Wait app
        run: sleep 10

      - name: ZAP scan
        run: |
          docker run --rm \
            -v $(pwd):/zap/wrk/:rw \
            owasp/zap2docker-stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -r report.html || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.html

# =========================
# 5. DEPLOY EKS
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ecommerce-cluster --region $AWS_REGION

      - name: Deploy with Helm
        run: |
          helm upgrade --install e-shop ./k8s/helm/e-shop \
            --set image.repository=$REGISTRY/$APP_REPOSITORY \
            --set image.tag=latest \
            --wait