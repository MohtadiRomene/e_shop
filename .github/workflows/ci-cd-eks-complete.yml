name: CI/CD EKS — e-shop

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ecommerce-cluster
  APP_REPOSITORY: e-shop/app
  WEB_REPOSITORY: e-shop/web
  HELM_RELEASE: e-shop
  HELM_NAMESPACE: e-shop
  SONAR_HOST_URL: http://35.171.229.243:9000

permissions:
  id-token: write
  contents: read

# =========================
# 1. TESTS
# =========================
jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306

    env:
      APP_ENV: test
      DATABASE_URL: "mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0"

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql

      - run: composer install --no-interaction

      - name: Wait MySQL
        run: |
          for i in {1..10}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot && break
            sleep 3
          done

      - name: Grant rights
        run: |
          mysql -h127.0.0.1 -uroot -proot \
          -e "GRANT ALL PRIVILEGES ON *.* TO 'app'@'%'; FLUSH PRIVILEGES;"

      - run: php bin/console doctrine:database:create --if-not-exists
      - run: php bin/console doctrine:migrations:migrate --no-interaction
      - run: php bin/phpunit

# =========================
# 2. SONAR
# =========================
  sonar:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Check Sonar
        run: |
          for i in {1..3}; do
            if curl -fsS --max-time 10 $SONAR_HOST_URL/api/server/version; then
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "Sonar unreachable -> skip"
          exit 0

      - name: Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

# =========================
# 3. BUILD & PUSH
# =========================
  build:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Ensure repos exist
        run: |
          aws ecr describe-repositories --repository-names $APP_REPOSITORY || \
          aws ecr create-repository --repository-name $APP_REPOSITORY

          aws ecr describe-repositories --repository-names $WEB_REPOSITORY || \
          aws ecr create-repository --repository-name $WEB_REPOSITORY

      - name: Build
        run: |
          docker build -t $REGISTRY/$APP_REPOSITORY:latest .
          docker build -f docker/nginx/Dockerfile -t $REGISTRY/$WEB_REPOSITORY:latest .

      - name: Push
        run: |
          docker push $REGISTRY/$APP_REPOSITORY:latest
          docker push $REGISTRY/$WEB_REPOSITORY:latest

# =========================
# 4. DEPLOY EKS
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Connect EKS
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Set registry
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV

      - name: Deploy
        run: |
          helm upgrade --install $HELM_RELEASE ./k8s/helm/e-shop \
            --namespace $HELM_NAMESPACE \
            --create-namespace \
            --set image.app.repository=$ECR_REGISTRY/$APP_REPOSITORY \
            --set image.web.repository=$ECR_REGISTRY/$WEB_REPOSITORY \
            --set image.app.tag=latest \
            --set image.web.tag=latest \
            --wait

      - name: Verify
        run: |
          kubectl get pods -n $HELM_NAMESPACE