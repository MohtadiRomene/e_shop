name: CI/CD EKS — e-shop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ecommerce-cluster
  APP_REPOSITORY: e-shop/app
  WEB_REPOSITORY: e-shop/web
  HELM_RELEASE: e-shop
  HELM_NAMESPACE: e-shop
  SONAR_HOST_URL: http://3.91.213.211:9000

permissions:
  id-token: write
  contents: read

# ═══════════════════════════════
# STAGE 1 — TESTS
# ═══════════════════════════════
jobs:
  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - run: composer install --no-interaction --prefer-dist

      - run: php bin/console doctrine:database:create --if-not-exists
      - run: php bin/console doctrine:migrations:migrate --no-interaction

      - run: php bin/phpunit

# ═══════════════════════════════
# STAGE 2 — SONARQUBE
# ═══════════════════════════════
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - run: composer install --no-interaction

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          php -d xdebug.mode=coverage bin/phpunit \
            --coverage-clover coverage/clover.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

# ═══════════════════════════════
# STAGE 3 — BUILD & PUSH ECR
# ═══════════════════════════════
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name != 'pull_request'

    outputs:
      app_image: ${{ steps.meta.outputs.app_image }}
      web_image: ${{ steps.meta.outputs.web_image }}

    steps:
      - uses: actions/checkout@v4

      # ✅ AWS OIDC (SECURE)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: sha-${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$APP_REPOSITORY:$TAG .
          docker build -f docker/nginx/Dockerfile -t $REGISTRY/$WEB_REPOSITORY:$TAG .

      - name: Push images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: sha-${{ github.sha }}
        run: |
          docker push $REGISTRY/$APP_REPOSITORY:$TAG
          docker push $REGISTRY/$WEB_REPOSITORY:$TAG

      - name: Export images
        id: meta
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: sha-${{ github.sha }}
        run: |
          echo "app_image=$REGISTRY/$APP_REPOSITORY:$TAG" >> $GITHUB_OUTPUT
          echo "web_image=$REGISTRY/$WEB_REPOSITORY:$TAG" >> $GITHUB_OUTPUT

# ═══════════════════════════════
# STAGE 4 — DAST (ZAP)
# ═══════════════════════════════
  dast:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run container
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: sha-${{ github.sha }}
        run: |
          docker run -d -p 8080:80 $REGISTRY/$WEB_REPOSITORY:$TAG
          sleep 20

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          fail_action: false

# ═══════════════════════════════
# STAGE 5 — DEPLOY EKS
# ═══════════════════════════════
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build, dast]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      - name: Get ECR registry
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV

      - name: Deploy with Helm
        run: |
          helm upgrade --install $HELM_RELEASE ./k8s/helm/e-shop \
            --namespace $HELM_NAMESPACE \
            --create-namespace \
            --set image.app.repository=$ECR_REGISTRY/$APP_REPOSITORY \
            --set image.web.repository=$ECR_REGISTRY/$WEB_REPOSITORY \
            --set image.app.tag=sha-${{ github.sha }} \
            --set image.web.tag=sha-${{ github.sha }} \
            --wait

      - name: Verify deployment
        run: |
          kubectl get pods -n $HELM_NAMESPACE
          kubectl get svc -n $HELM_NAMESPACE