name: CI/CD EKS Pipeline

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 869937525188
  REGISTRY: 869937525188.dkr.ecr.us-east-1.amazonaws.com

  APP_REPOSITORY: e-shop/app
  WEB_REPOSITORY: e-shop/web

  SONAR_HOST: http://3.87.200.146:9000


jobs:

# =========================
# 1. TESTS
# =========================
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: php bin/phpunit


# =========================
# 2. SONARQUBE
# =========================
  sonar:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Check Sonar
        run: curl -f $SONAR_HOST/api/server/version

      - name: Sonar scan
        run: |
          docker run --rm \
            -e SONAR_HOST_URL=$SONAR_HOST \
            -e SONAR_LOGIN=${{ secrets.SONAR_TOKEN }} \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli


# =========================
# 3. BUILD & PUSH ECR (FIXED)
# =========================
  build:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      # AWS LOGIN
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # CHECK ACCOUNT (DEBUG)
      - name: Verify AWS Account
        run: aws sts get-caller-identity

      # FORCE CREATE ECR (IMPORTANT FIX)
      - name: Ensure ECR Repositories exist
        run: |
          aws ecr create-repository --repository-name $APP_REPOSITORY --region $AWS_REGION || true
          aws ecr create-repository --repository-name $WEB_REPOSITORY --region $AWS_REGION || true

      # LOGIN ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $REGISTRY

      # BUILD IMAGES
      - name: Build images
        run: |
          docker build -t $REGISTRY/$APP_REPOSITORY:latest .
          docker build -f docker/nginx/Dockerfile -t $REGISTRY/$WEB_REPOSITORY:latest .

      # PUSH IMAGES
      - name: Push images
        run: |
          docker push $REGISTRY/$APP_REPOSITORY:latest
          docker push $REGISTRY/$WEB_REPOSITORY:latest


# =========================
# 4. DAST (ZAP)
# =========================
  dast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Run container
        run: docker run -d -p 8080:80 nginx

      - name: ZAP scan
        run: |
          docker run --rm owasp/zap2docker-stable \
            zap-baseline.py -t http://localhost:8080 || true


# =========================
# 5. DEPLOY EKS
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ecommerce-cluster --region $AWS_REGION

      - name: Deploy Helm
        run: |
          helm upgrade --install e-shop ./k8s/helm/e-shop \
            --namespace e-shop --create-namespace \
            --set image.app.repository=$REGISTRY/$APP_REPOSITORY \
            --set image.web.repository=$REGISTRY/$WEB_REPOSITORY \
            --set image.tag=latest