name: CI/CD EKS — e-shop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ──────────────────────────────────────────────
# Variables globales
# ──────────────────────────────────────────────
env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ecommerce-cluster
  APP_REPOSITORY: e-shop/app
  WEB_REPOSITORY: e-shop/web
  HELM_RELEASE: e-shop
  HELM_NAMESPACE: e-shop

permissions:
  id-token: write   # OIDC GitHub → AWS
  contents: read

# ══════════════════════════════════════════════
# STAGE 1 — CI : Tests PHP + SonarQube
# ══════════════════════════════════════════════
jobs:
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uapp -papp --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: test_secret_ci_only
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app_test?serverVersion=8.0.32&charset=utf8mb4
      MAILER_DSN: null://null

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run PHPUnit
        run: php bin/phpunit --testdox

  # ──────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: php-tests
    if: ${{ vars.SONAR_HOST_URL != '' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uapp -papp --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: test_secret_ci_only
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app_test?serverVersion=8.0.32&charset=utf8mb4
      MAILER_DSN: null://null

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, pdo_mysql
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run PHPUnit with coverage
        run: |
          mkdir -p coverage
          php -d xdebug.mode=coverage bin/phpunit \
            --log-junit coverage/junit.xml \
            --coverage-clover coverage/clover.xml

      - name: Check SonarQube connectivity
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 10 "${SONAR_HOST_URL}/api/server/version" > /dev/null; then
              echo "SonarQube reachable ✅"
              exit 0
            fi
            echo "Attempt ${i}/3 failed. Retrying in 5s..."
            sleep 5
          done
          echo "SonarQube not reachable ❌"
          exit 1

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

# ══════════════════════════════════════════════
# STAGE 2 — BUILD : Docker → ECR
# ══════════════════════════════════════════════
  build:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    needs: php-tests
    if: github.event_name != 'pull_request'

    outputs:
      app_image: ${{ steps.meta.outputs.app_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
      registry: ${{ steps.login-ecr.outputs.registry }}
      sha_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authentification AWS via OIDC (pas de clés stockées) ──
      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_GITHUB_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Fallback : clés AWS classiques ──
      - name: Configure AWS credentials (Access Keys fallback)
        if: ${{ secrets.AWS_GITHUB_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build des 2 images Docker ──
      - name: Build & tag images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail

          echo "Building APP image..."
          docker build -f Dockerfile \
            --build-arg APP_ENV=prod \
            -t "${REGISTRY}/${APP_REPOSITORY}:${SHA_TAG}" \
            -t "${REGISTRY}/${APP_REPOSITORY}:latest" \
            .

          echo "Building WEB (nginx) image..."
          docker build -f docker/nginx/Dockerfile \
            -t "${REGISTRY}/${WEB_REPOSITORY}:${SHA_TAG}" \
            -t "${REGISTRY}/${WEB_REPOSITORY}:latest" \
            .

      # ── Push vers ECR ──
      - name: Push images to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail

          echo "Pushing APP image..."
          docker push "${REGISTRY}/${APP_REPOSITORY}:${SHA_TAG}"
          docker push "${REGISTRY}/${APP_REPOSITORY}:latest"

          echo "Pushing WEB image..."
          docker push "${REGISTRY}/${WEB_REPOSITORY}:${SHA_TAG}"
          docker push "${REGISTRY}/${WEB_REPOSITORY}:latest"

          echo "Images pushed ✅"

      - name: Export image URIs
        id: meta
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          echo "app_image=${REGISTRY}/${APP_REPOSITORY}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/${WEB_REPOSITORY}:${SHA_TAG}" >> "$GITHUB_OUTPUT"

# ══════════════════════════════════════════════
# STAGE 3 — SECURITY : DAST avec OWASP ZAP
# ══════════════════════════════════════════════
  dast-scan:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Lancer l'app en local avec Docker pour scanner ──
      - name: Configure AWS credentials
        if: ${{ secrets.AWS_GITHUB_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Start application for DAST scan
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail

          # Lancer l'app avec docker compose pour le scan
          cat > docker-compose.dast.yml << EOF
          version: "3.8"
          services:
            app:
              image: ${REGISTRY}/${APP_REPOSITORY}:${SHA_TAG}
              environment:
                APP_ENV: prod
                APP_SECRET: dast_scan_secret_only
                DATABASE_URL: mysql://app:app@db:3306/app?serverVersion=8.0
              depends_on:
                - db
            web:
              image: ${REGISTRY}/${WEB_REPOSITORY}:${SHA_TAG}
              ports:
                - "8080:80"
              depends_on:
                - app
            db:
              image: mysql:8.0
              environment:
                MYSQL_ROOT_PASSWORD: root
                MYSQL_DATABASE: app
                MYSQL_USER: app
                MYSQL_PASSWORD: app
          EOF

          docker compose -f docker-compose.dast.yml up -d

          # Attendre que l'app soit prête
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 http://localhost:8080 > /dev/null 2>&1; then
              echo "App is ready ✅"
              break
            fi
            echo "Attempt ${i}/30 — waiting..."
            sleep 5
          done

      # ── OWASP ZAP Baseline Scan ──
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          fail_action: false   # ne bloque pas le pipeline, génère juste le rapport
        continue-on-error: true

      # ── Sauvegarder le rapport ZAP ──
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report-${{ github.sha }}
          path: |
            report_html.html
            report_json.json
            zap.out
          retention-days: 30

      - name: Stop application
        if: always()
        run: docker compose -f docker-compose.dast.yml down -v

# ══════════════════════════════════════════════
# STAGE 4 — DEPLOY : EKS Production
# ══════════════════════════════════════════════
  deploy-prod:
    name: Deploy → EKS Production
    runs-on: ubuntu-latest
    needs: [build, dast-scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authentification AWS ──
      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_GITHUB_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Keys fallback)
        if: ${{ secrets.AWS_GITHUB_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      # ── Connexion au cluster EKS ──
      - name: Update kubeconfig
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION"
          kubectl get nodes
          echo "Connected to EKS ✅"

      # ── Récupérer le registry ECR ──
      - name: Set ECR registry
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"
          echo "ECR Registry: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # ── Installer External Secrets Operator ──
      - name: Install External Secrets Operator
        run: |
          set -euo pipefail
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait \
            --timeout 10m
          echo "External Secrets Operator ready ✅"

      - name: Wait for External Secrets CRDs
        run: |
          kubectl wait --for=condition=Established --timeout=180s \
            crd/externalsecrets.external-secrets.io
          kubectl wait --for=condition=Established --timeout=180s \
            crd/secretstores.external-secrets.io
          kubectl wait --for=condition=Established --timeout=180s \
            crd/clustersecretstores.external-secrets.io
          kubectl -n external-secrets rollout status deploy/external-secrets \
            --timeout=300s
          echo "CRDs ready ✅"

      # ── Déployer avec Helm ──
      - name: Deploy to EKS
        run: |
          set -euo pipefail
          helm upgrade --install $HELM_RELEASE ./k8s/helm/e-shop \
            --namespace $HELM_NAMESPACE \
            --create-namespace \
            --set image.app.repository=$ECR_REGISTRY/${{ env.APP_REPOSITORY }} \
            --set image.web.repository=$ECR_REGISTRY/${{ env.WEB_REPOSITORY }} \
            --set image.app.tag=sha-${{ github.sha }} \
            --set image.web.tag=sha-${{ github.sha }} \
            --set externalSecrets.remoteSecretName=/e-shop/prod/app \
            --atomic \
            --wait \
            --timeout 10m
          echo "Helm deploy done ✅"

      # ── Vérifier le déploiement ──
      - name: Verify rollout
        run: |
          set -euo pipefail
          kubectl -n "$HELM_NAMESPACE" rollout status deploy/e-shop \
            --timeout=600s
          echo "Rollout OK ✅"

      - name: Verify migrations job
        run: |
          set -euo pipefail
          kubectl -n "$HELM_NAMESPACE" wait \
            --for=condition=complete \
            job/e-shop-migrations \
            --timeout=600s
          echo "Migrations OK ✅"

      # ── Résumé du déploiement ──
      - name: Deployment summary
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "  DEPLOYMENT SUMMARY"
          echo "════════════════════════════════════"
          echo "Cluster    : $EKS_CLUSTER_NAME"
          echo "Namespace  : $HELM_NAMESPACE"
          echo "Image tag  : sha-${{ github.sha }}"
          echo "Registry   : $ECR_REGISTRY"
          echo "════════════════════════════════════"
          kubectl -n "$HELM_NAMESPACE" get pods
          kubectl -n "$HELM_NAMESPACE" get services
          kubectl -n "$HELM_NAMESPACE" get ingress
