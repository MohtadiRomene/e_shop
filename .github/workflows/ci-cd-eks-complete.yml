name: CI/CD EKS Pipeline

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: us-east-1
  ECR_APP: e-shop/app
  ECR_WEB: e-shop/web
  EKS_CLUSTER: ecommerce-cluster
  HELM_RELEASE: e-shop
  HELM_NAMESPACE: e-shop
  SONAR_HOST: http://3.87.200.146:9000

jobs:

# =========================
# 1. TESTS
# =========================
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait MySQL
        run: |
          for i in {1..10}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot && break
            sleep 3
          done

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run tests
        run: php bin/phpunit


# =========================
# 2. SONARQUBE (FIXED)
# =========================
  sonar:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Check SonarQube
        run: |
          curl -s --max-time 5 $SONAR_HOST/api/server/version || exit 1

      - name: Sonar Scan
        run: |
          docker run --rm \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.host.url=$SONAR_HOST \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}


# =========================
# 3. BUILD & PUSH ECR (FIX COMPLET)
# =========================
  build:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV

      - name: Login ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $REGISTRY

      - name: Build images
        run: |
          docker build -t $REGISTRY/$ECR_APP:latest .
          docker build -f docker/nginx/Dockerfile -t $REGISTRY/$ECR_WEB:latest .

      - name: Push images
        run: |
          docker push $REGISTRY/$ECR_APP:latest
          docker push $REGISTRY/$ECR_WEB:latest


# =========================
# 4. DAST (ZAP)
# =========================
  dast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run container
        run: docker run -d -p 8080:80 nginx

      - name: ZAP Scan
        run: |
          docker run --rm \
            -v $(pwd):/zap/wrk/ \
            owasp/zap2docker-stable \
            zap-baseline.py -t http://localhost:8080 || true


# =========================
# 5. DEPLOY EKS (FIXED)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy Helm
        run: |
          helm upgrade --install $HELM_RELEASE ./k8s/helm/e-shop \
            --namespace $HELM_NAMESPACE \
            --create-namespace \
            --set image.app.repository=$REGISTRY/$ECR_APP \
            --set image.web.repository=$REGISTRY/$ECR_WEB \
            --set image.tag=latest \
            --wait

      - name: Verify
        run: kubectl get pods -n $HELM_NAMESPACE