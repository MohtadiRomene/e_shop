name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  php-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uapp -papp --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: test_secret_ci_only
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0.32&charset=utf8mb4
      MAILER_DSN: null://null

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Validate Composer config
        run: composer validate || true

      - name: Prepare database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run PHPUnit
        run: php bin/phpunit --testdox

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: php-tests
    if: ${{ vars.SONAR_HOST_URL != '' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uapp -papp --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: test_secret_ci_only
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0.32&charset=utf8mb4
      MAILER_DSN: null://null

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, pdo_mysql
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run PHPUnit with coverage
        run: |
          mkdir -p coverage
          php -d xdebug.mode=coverage bin/phpunit \
            --log-junit coverage/junit.xml \
            --coverage-clover coverage/clover.xml

      - name: Check SonarQube connectivity
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          echo "Checking: ${SONAR_HOST_URL}/api/server/version"
          for i in 1 2 3; do
            if curl -fsS --max-time 10 "${SONAR_HOST_URL}/api/server/version" > /dev/null; then
              echo "SonarQube reachable."
              exit 0
            fi
            echo "Attempt ${i}/3 failed. Retrying in 5s..."
            sleep 5
          done
          echo "SonarQube is not reachable from GitHub-hosted runner."
          echo "Fix: expose SonarQube publicly (with auth) or use a self-hosted runner in the same VPC."
          exit 1

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
