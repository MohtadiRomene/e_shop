namespace: e-shop

serviceAccount:
  create: true
  name: e-shop-app
  roleArn: arn:aws:iam::111111111111:role/e-shop-prod-app-irsa

image:
  app:
    repository: 111111111111.dkr.ecr.eu-west-1.amazonaws.com/e-shop/app
    tag: "sha-placeholder"
    pullPolicy: IfNotPresent
  web:
    repository: 111111111111.dkr.ecr.eu-west-1.amazonaws.com/e-shop/web
    tag: "sha-placeholder"
    pullPolicy: IfNotPresent

replicaCount: 3

resources:
  app:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  web:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: alb
  host: shop.example.com
  certificateArn: arn:aws:acm:eu-west-1:111111111111:certificate/replace-me
  healthcheckPath: /healthz

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  minAvailable: 2

externalSecrets:
  enabled: true
  secretStoreRef: aws-secretsmanager
  remoteSecretName: /e-shop/prod/app

env:
  appEnv: prod
  appDebug: "0"
  trustedProxies: REMOTE_ADDR
  trustedHosts: "^shop\\.example\\.com$"
  runMigrations: "0"
