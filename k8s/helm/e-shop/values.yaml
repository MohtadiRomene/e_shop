namespace: e-shop

serviceAccount:
  create: true
  name: e-shop-app
  roleArn: "arn:aws:iam::869937525188:role/e-shop-prod-app-irsa"

image:
  app:
    repository: "869937525188.dkr.ecr.us-east-1.amazonaws.com/e-shop/app"
    tag: "sha-placeholder"
    pullPolicy: IfNotPresent
  web:
    repository: "869937525188.dkr.ecr.us-east-1.amazonaws.com/e-shop/web"
    tag: "sha-placeholder"
    pullPolicy: IfNotPresent

# ✅ FIX: replicaCount réduit à 1 pour le debug
replicaCount: 1

resources:
  app:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  web:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

service:
  type: ClusterIP
  port: 80

ingress:
  # ✅ FIX: désactivé temporairement (manque permissions ec2:DescribeRouteTables)
  enabled: false
  className: alb
  host: ""
  certificateArn: ""
  healthcheckPath: /healthz

hpa:
  # ✅ FIX: désactivé temporairement (metrics-server pas prêt)
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  # ✅ FIX: minAvailable réduit à 0 pour permettre le déploiement avec 1 replica
  minAvailable: 0

externalSecrets:
  enabled: true
  secretStoreRef: aws-secretsmanager
  remoteSecretName: /e-shop/prod/app

migrations:
  enabled: true
  backoffLimit: 1

# ✅ FIX: securityContext au bon niveau (pas sous migrations)
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

env:
  appEnv: prod
  appDebug: "0"
  trustedProxies: REMOTE_ADDR
  trustedHosts: "^shop\\.example\\.com$"
  runMigrations: "0"
