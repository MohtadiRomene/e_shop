apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: production
  labels:
    app: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ecommerce
    spec:
      containers:
        - name: app
          # ⚠️ Remplace TON_ACCOUNT_ID par ton AWS Account ID
          image: TON_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/e-shop-app:latest
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 5
